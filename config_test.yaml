model:
  mode: dev
  dev:
    provider: openai_compatible
    base_url: https://api.openai.com/v1
    llm_model: gpt-4o
    vlm_model: gpt-4o
  prod:
    provider: vllm
    base_url: http://localhost:8000/v1
    llm_model: Qwen3-VL-8B-Instruct
    vlm_model: Qwen3-VL-8B-Instruct

agent:
  max_iterations: 15
  planning_enabled: true
  postprocessing_enabled: true
  log_level: INFO
  max_history: 10

tools:
  enabled_modules:
    - vsa_agent.tools.echo_tool

server:
  host: "0.0.0.0"
  port: 8000

prompts:
  default_system: |
    Test system prompt.
  safety_routine_inspection: |
    Test routine inspection prompt.
  safety_incident_investigation: |
    Test incident investigation prompt.
  vlm_format_instruction: |
    Test VLM format instruction.

video_understanding:
  max_fps: 2.0
  min_pixels: 50176
  max_pixels: 921600
  reasoning_effort: medium
  filter_thinking: true
  max_retries: 3
  time_format: iso
  source_mode: local
  translated_base_dir: "C:/mounted-video-store"
  vst_sensor_source_map:
    camera-1: "rtsp://camera-1/stream"

lvs_video_understanding:
  chunk_duration_sec: 30
  max_frames_per_chunk: 12
  max_chunks:
  merge_adjacent_events: true
