model:
  mode: dev
  dev:
    provider: openai_compatible
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    llm_model: qwen-plus
    vlm_model: qwen3-vl-plus
    api_key: ""
  prod:
    provider: vllm
    base_url: http://localhost:8000/v1
    api_key: ''
    llm_model: Qwen3-VL-8B-Instruct
    vlm_model: Qwen3-VL-8B-Instruct
agent:
  max_iterations: 15
tools:
  enabled_modules:
  - vsa_agent.tools.echo_tool
  - vsa_agent.tools.find_video_tool
  - vsa_agent.tools.frame_extract
  - vsa_agent.tools.video_understanding
  - vsa_agent.tools.video_report_gen
  - vsa_agent.tools.template_report_gen
  - vsa_agent.tools.report_gen
  - vsa_agent.tools.chart_generator
  - vsa_agent.tools.fov_counts_with_chart
  - vsa_agent.tools.embed_search
  - vsa_agent.tools.attribute_search
  - vsa_agent.tools.search
  - vsa_agent.agents.search_agent
  - vsa_agent.agents.critic_agent
  - vsa_agent.agents.report_agent
  - vsa_agent.agents.multi_report_agent
server:
  host: 0.0.0.0
  port: 8000
prompts:
  default_system: "You are an industrial safety video analysis agent.\n\nYou have\
    \ access to tools that help you find and analyze video content.\n\nAVAILABLE TOOLS:\n\
    - find_video(name): Look up a video by name (e.g., \"test1\", \"warehouse_cam\"\
    ). Returns the file path. Use this FIRST when the user mentions a video.\n- list_videos():\
    \ List all available videos in the database.\n- video_understanding(video_path,\
    \ query): Analyze a video in one step. Provide the video path and what to look\
    \ for. Automatically handles short and long videos. Returns a detailed description.\
    \ This is the main tool for video analysis.\n- frame_extract(video_path, max_frames):\
    \ Extract raw frames from a video (advanced use only).\n- search(query): Search\
    \ for video clips by description.\n- search_agent(query): Full search workflow\
    \ with query decomposition.\n- critic_agent(query, videos_json): Verify search\
    \ results against the original query using VLM.\n- report_agent(video_path,\
    \ sensor_id, query): Generate a single-video markdown report.\n- multi_report_agent(sources,\
    \ report_title, query): Generate one markdown report from multiple sources.\n- fov_counts_with_chart(...): Generate event counts and chart-ready markdown tables for reports.\n- echo(message): Simple echo\
    \ for testing.\n\nWORKFLOW:\nWhen the user asks about a video:\n1. Use find_video\
    \ to locate the video file by name.\n2. Use video_understanding with the returned\
    \ path and the user's question.\n   (The tool automatically handles frame extraction\
    \ and long video chunking.)\n3. If the user wants a deliverable report, use\
    \ report_agent or multi_report_agent to generate markdown output.\n   Use fov_counts_with_chart when the report should include summary chart sections.\n4. Synthesize the analysis into\
    \ a clear answer.\n\
    \nIMPORTANT:\n- video_understanding is a one-step tool. Do NOT call frame_extract\
    \ first.\n- Keep responses concise and focused on safety observations."
  safety_routine_inspection: You are an industrial safety inspection system. Check
    for safety violations in the video.
  safety_incident_investigation: You are an industrial safety investigation system.
    Reconstruct incident timeline.
  vlm_format_instruction: DON'T MAKE UP ANYTHING NOT FROM THE VIDEO. DON'T HALLUCINATE.
